<!doctype html>
<!--
  文件职责：
  Vite 单页应用 HTML 入口。

  系统位置：
  浏览器首先加载本文件，随后通过 /src/main.js 启动 Vue 应用。

  调用关系：
  #app 节点由 main.js 挂载 App.vue；具体页面再由 Vue Router 渲染。
-->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工业视觉质量闭环系统</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
